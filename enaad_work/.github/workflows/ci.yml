name: quality-gate

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lughati_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lughati_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/lughati_test
      BETTER_AUTH_SECRET: ci-only-stable-secret-with-at-least-32-characters
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      AUTH_TRUSTED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      E2E_WEB_COMMAND: corepack pnpm@10.28.2 start
      E2E_ALLOW_ADMIN_FIXTURE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          NODE_ENV: production
          BETTER_AUTH_URL: https://lughati.example
          NEXT_PUBLIC_APP_URL: https://lughati.example
          AUTH_TRUSTED_ORIGINS: https://lughati.example
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
